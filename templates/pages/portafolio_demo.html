{% load static %}
<!doctype html>
<html lang="es-CO">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title }} — Demo | Sergio Rueda</title>
  <meta name="robots" content="noindex,nofollow">
  <link rel="icon" type="image/png" sizes="32x32" href="{% static 'img/favicon-32.png' %}">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    .demo-bar{
      position:fixed;top:0;left:0;right:0;z-index:99999;
      background:#0b1220;
      border-bottom:1px solid rgba(165,180,252,.2);
      padding:10px 20px;
      display:flex;align-items:center;justify-content:space-between;
      gap:12px;
      font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
      backdrop-filter:blur(12px);
    }
    .demo-bar-left{display:flex;align-items:center;gap:14px}
    .demo-back{
      display:inline-flex;align-items:center;gap:6px;
      color:#a5b4fc;text-decoration:none;font-size:.82rem;font-weight:600;
      padding:6px 14px;border-radius:8px;
      border:1px solid rgba(165,180,252,.2);
      background:rgba(165,180,252,.08);
      transition:all .2s;
    }
    .demo-back:hover{background:rgba(165,180,252,.18);color:#c4b5fd}
    .demo-info{display:flex;flex-direction:column;gap:1px}
    .demo-title{color:#e6edf3;font-size:.85rem;font-weight:600}
    .demo-cat{
      font-size:.68rem;font-weight:500;
      color:rgba(255,255,255,.5);
      display:flex;align-items:center;gap:5px;
    }
    .demo-badge{
      font-size:.65rem;font-weight:600;
      padding:3px 10px;border-radius:999px;
      background:rgba(134,239,172,.12);border:1px solid rgba(134,239,172,.25);
      color:#86efac;
    }
    .demo-cta{
      display:inline-flex;align-items:center;gap:6px;
      background:#25d366;color:#fff;
      font-size:.78rem;font-weight:600;
      padding:7px 16px;border-radius:8px;
      text-decoration:none;border:none;
      transition:all .2s;white-space:nowrap;
    }
    .demo-cta:hover{background:#20bd5a;transform:translateY(-1px)}
    .demo-iframe{
      width:100%;height:calc(100vh - 52px);
      margin-top:52px;border:none;display:block;
    }
    @media(max-width:640px){
      .demo-bar{padding:8px 12px;gap:8px}
      .demo-info{display:none}
      .demo-badge{display:none}
    }
  </style>
</head>
<body>
  <div class="demo-bar">
    <div class="demo-bar-left">
      <a href="{% url 'web:index' %}#portafolio-web" class="demo-back">
        <i class="bi bi-arrow-left"></i> Volver
      </a>
      <div class="demo-info">
        <span class="demo-title">{{ page.title }}</span>
        <span class="demo-cat"><i class="bi {{ page.icon }}"></i> {{ page.category }}</span>
      </div>
      <span class="demo-badge"><i class="bi bi-eye me-1"></i>DEMO</span>
    </div>
    <a class="demo-cta" href="https://wa.me/573143801560?text=Hola%20Sergio%2C%20me%20interesa%20una%20p%C3%A1gina%20como%20{{ page.title|urlencode }}" target="_blank" rel="noopener noreferrer">
      <i class="bi bi-whatsapp"></i> Quiero una así
    </a>
  </div>

  <iframe class="demo-iframe" src="{% url 'web:portafolio_raw' slug %}" title="Demo: {{ page.title }}"></iframe>
</body>
</html>
