<section id="estadisticas" class="section py-5" aria-label="Estadísticas">
  <div class="container">
    <div class="row g-4 text-center">
      <div class="col-6 col-md-3">
        <div class="stat-card glass p-4">
          <div class="stat-number" data-target="16">0</div>
          <div class="stat-label">Diseños entregados</div>
        </div>
      </div>
      <div class="col-6 col-md-3">
        <div class="stat-card glass p-4">
          <div class="stat-number" data-target="11" data-suffix="+">0</div>
          <div class="stat-label">Años de experiencia</div>
        </div>
      </div>
      <div class="col-6 col-md-3">
        <div class="stat-card glass p-4">
          <div class="stat-number" data-target="30" data-suffix="+">0</div>
          <div class="stat-label">Proyectos completados</div>
        </div>
      </div>
      <div class="col-6 col-md-3">
        <div class="stat-card glass p-4">
          <div class="stat-number" data-target="100" data-suffix="%">0</div>
          <div class="stat-label">Clientes satisfechos</div>
        </div>
      </div>
    </div>
  </div>

  <script>
  document.addEventListener('DOMContentLoaded', function() {
    const counters = document.querySelectorAll('.stat-number');
    let animated = false;

    function animateCounters() {
      counters.forEach(function(counter) {
        const target = parseInt(counter.getAttribute('data-target'));
        const suffix = counter.getAttribute('data-suffix') || '';
        const duration = 2000;
        const step = Math.ceil(target / (duration / 16));
        let current = 0;

        function update() {
          current += step;
          if (current >= target) {
            counter.textContent = target + suffix;
          } else {
            counter.textContent = current + suffix;
            requestAnimationFrame(update);
          }
        }
        requestAnimationFrame(update);
      });
    }

    var observer = new IntersectionObserver(function(entries) {
      entries.forEach(function(entry) {
        if (entry.isIntersecting && !animated) {
          animated = true;
          animateCounters();
        }
      });
    }, { threshold: 0.3 });

    var section = document.getElementById('estadisticas');
    if (section) observer.observe(section);
  });
  </script>
</section>
