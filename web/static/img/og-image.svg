<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0b"/>
      <stop offset="100%" stop-color="#111113"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#b8b8c0"/>
    </linearGradient>
    <radialGradient id="glow1" cx="20%" cy="30%" r="50%">
      <stop offset="0%" stop-color="rgba(16,185,129,0.15)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="glow2" cx="80%" cy="60%" r="40%">
      <stop offset="0%" stop-color="rgba(59,130,246,0.1)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Grid pattern -->
  <g opacity="0.04" stroke="#fff" stroke-width="0.5">
    <line x1="0" y1="48" x2="1200" y2="48"/><line x1="0" y1="96" x2="1200" y2="96"/>
    <line x1="0" y1="144" x2="1200" y2="144"/><line x1="0" y1="192" x2="1200" y2="192"/>
    <line x1="0" y1="240" x2="1200" y2="240"/><line x1="0" y1="288" x2="1200" y2="288"/>
    <line x1="0" y1="336" x2="1200" y2="336"/><line x1="0" y1="384" x2="1200" y2="384"/>
    <line x1="0" y1="432" x2="1200" y2="432"/><line x1="0" y1="480" x2="1200" y2="480"/>
    <line x1="0" y1="528" x2="1200" y2="528"/><line x1="0" y1="576" x2="1200" y2="576"/>
    <line x1="48" y1="0" x2="48" y2="630"/><line x1="96" y1="0" x2="96" y2="630"/>
    <line x1="144" y1="0" x2="144" y2="630"/><line x1="192" y1="0" x2="192" y2="630"/>
    <line x1="240" y1="0" x2="240" y2="630"/><line x1="288" y1="0" x2="288" y2="630"/>
    <line x1="336" y1="0" x2="336" y2="630"/><line x1="384" y1="0" x2="384" y2="630"/>
    <line x1="432" y1="0" x2="432" y2="630"/><line x1="480" y1="0" x2="480" y2="630"/>
    <line x1="528" y1="0" x2="528" y2="630"/><line x1="576" y1="0" x2="576" y2="630"/>
    <line x1="624" y1="0" x2="624" y2="630"/><line x1="672" y1="0" x2="672" y2="630"/>
    <line x1="720" y1="0" x2="720" y2="630"/><line x1="768" y1="0" x2="768" y2="630"/>
    <line x1="816" y1="0" x2="816" y2="630"/><line x1="864" y1="0" x2="864" y2="630"/>
    <line x1="912" y1="0" x2="912" y2="630"/><line x1="960" y1="0" x2="960" y2="630"/>
    <line x1="1008" y1="0" x2="1008" y2="630"/><line x1="1056" y1="0" x2="1056" y2="630"/>
    <line x1="1104" y1="0" x2="1104" y2="630"/><line x1="1152" y1="0" x2="1152" y2="630"/>
  </g>

  <!-- Logo mark -->
  <rect x="80" y="80" width="48" height="48" rx="12" fill="url(#accent)"/>
  <text x="104" y="112" text-anchor="middle" font-family="system-ui,sans-serif" font-weight="800" font-size="24" fill="#04221a">SR</text>

  <!-- Name -->
  <text x="145" y="112" font-family="system-ui,sans-serif" font-weight="700" font-size="26" fill="#ededee">Sergio Rueda
    <tspan fill="#9ca3af" font-weight="500"> | Django Developer</tspan>
  </text>

  <!-- Headline -->
  <text x="80" y="230" font-family="system-ui,sans-serif" font-weight="800" font-size="52" fill="url(#textGrad)" letter-spacing="-1.5">I Build the Backend Your</text>
  <text x="80" y="295" font-family="system-ui,sans-serif" font-weight="800" font-size="52" fill="url(#accent)" letter-spacing="-1.5">eCommerce Business</text>
  <text x="80" y="360" font-family="system-ui,sans-serif" font-weight="800" font-size="52" fill="url(#textGrad)" letter-spacing="-1.5">Actually Needs</text>

  <!-- Subtitle -->
  <text x="80" y="420" font-family="system-ui,sans-serif" font-weight="400" font-size="22" fill="#9ca3af">Custom eCommerce Platforms · API Integrations · AI Automation</text>

  <!-- Badge bar -->
  <rect x="80" y="480" width="1040" height="1" fill="#1f1f23"/>

  <!-- Badges -->
  <circle cx="100" cy="525" r="4" fill="#10b981"/>
  <text x="115" font-family="monospace" font-size="16" fill="#6b7280" y="530">11+ Years Experience</text>

  <circle cx="370" cy="525" r="4" fill="#10b981"/>
  <text x="385" font-family="monospace" font-size="16" fill="#6b7280" y="530">30+ Projects Delivered</text>

  <circle cx="650" cy="525" r="4" fill="#10b981"/>
  <text x="665" font-family="monospace" font-size="16" fill="#6b7280" y="530">Python · Django · AWS</text>

  <!-- Accent line bottom -->
  <rect x="0" y="624" width="1200" height="6" fill="url(#accent)"/>
</svg>
